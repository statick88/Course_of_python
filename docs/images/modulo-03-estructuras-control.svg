<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="#1e293b"/>
  
  <!-- Title -->
  <text x="200" y="40" text-anchor="middle" fill="#f8fafc" font-family="system-ui" font-size="18" font-weight="bold">Estructuras de Control</text>
  
  <!-- Decision diamond -->
  <polygon points="200,60 280,110 200,160 120,110" fill="#3b82f6" stroke="#60a5fa" stroke-width="2"/>
  <text x="200" y="115" text-anchor="middle" fill="white" font-family="system-ui" font-size="12" font-weight="bold">¿condición?</text>
  
  <!-- Yes branch -->
  <path d="M200 160 L200 200" stroke="#10b981" stroke-width="2"/>
  <polygon points="200,205 195,195 205,195" fill="#10b981"/>
  <rect x="140" y="205" width="120" height="40" rx="8" fill="#10b981"/>
  <text x="200" y="230" text-anchor="middle" fill="white" font-family="system-ui" font-size="11">Bloque True ✓</text>
  
  <!-- No branch -->
  <path d="M280 110 L330 110 L330 225 L260 225" stroke="#ef4444" stroke-width="2"/>
  <polygon points="265,225 275,220 275,230" fill="#ef4444"/>
  <rect x="260" y="230" width="120" height="40" rx="8" fill="#ef4444"/>
  <text x="320" y="255" text-anchor="middle" fill="white" font-family="system-ui" font-size="11">Bloque False ✗</text>
  
  <!-- Labels -->
  <text x="210" y="185" fill="#10b981" font-family="system-ui" font-size="10" font-weight="bold">Sí →</text>
  <text x="285" y="105" fill="#ef4444" font-family="system-ui" font-size="10" font-weight="bold">No →</text>
  
  <!-- Bottom note -->
  <rect x="30" y="15" width="340" height="0" rx="6" fill="#334155"/>
  <text x="200" y="290" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">if / elif / else — for — while</text>
</svg>
