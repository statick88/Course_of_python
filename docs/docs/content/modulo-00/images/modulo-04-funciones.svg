<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="#1e293b"/>
  
  <!-- Title -->
  <text x="200" y="40" text-anchor="middle" fill="#f8fafc" font-family="system-ui" font-size="18" font-weight="bold">Funciones en Python</text>
  
  <!-- Input box -->
  <rect x="20" y="100" width="90" height="50" rx="8" fill="#3b82f6"/>
  <text x="65" y="120" text-anchor="middle" fill="white" font-family="system-ui" font-size="11" font-weight="bold">Entrada</text>
  <text x="65" y="138" text-anchor="middle" fill="#dbeafe" font-family="monospace" font-size="10">argumentos</text>
  
  <!-- Arrow to function -->
  <path d="M110 125 L150 125" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="155,125 145,120 145,130" fill="#94a3b8"/>
  
  <!-- Function box -->
  <rect x="155" y="80" width="120" height="90" rx="12" fill="#8b5cf6" stroke="#a78bfa" stroke-width="2"/>
  <text x="215" y="105" text-anchor="middle" fill="white" font-family="monospace" font-size="13" font-weight="bold">def</text>
  <text x="215" y="125" text-anchor="middle" fill="#ede9fe" font-family="monospace" font-size="10">nombre():</text>
  <text x="215" y="145" text-anchor="middle" fill="#ede9fe" font-family="monospace" font-size="10">  procesar()</text>
  <text x="215" y="160" text-anchor="middle" fill="#ede9fe" font-family="monospace" font-size="10">  return</text>
  
  <!-- Arrow to output -->
  <path d="M275 125 L310 125" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="315,125 305,120 305,130" fill="#94a3b8"/>
  
  <!-- Output box -->
  <rect x="315" y="100" width="70" height="50" rx="8" fill="#10b981"/>
  <text x="350" y="120" text-anchor="middle" fill="white" font-family="system-ui" font-size="11" font-weight="bold">Salida</text>
  <text x="350" y="138" text-anchor="middle" fill="#d1fae5" font-family="monospace" font-size="10">resultado</text>
  
  <!-- Reuse concept -->
  <rect x="30" y="210" width="340" height="60" rx="10" fill="#334155"/>
  <text x="200" y="235" text-anchor="middle" fill="#f8fafc" font-family="system-ui" font-size="13" font-weight="bold">DRY: Don't Repeat Yourself</text>
  <text x="200" y="255" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="11">Escribe una vez, reusa infinitas veces</text>
  
  <!-- Decorative gears -->
  <circle cx="80" cy="240" r="15" stroke="#f59e0b" stroke-width="2" fill="none" stroke-dasharray="4 3"/>
  <circle cx="320" cy="240" r="15" stroke="#f59e0b" stroke-width="2" fill="none" stroke-dasharray="4 3"/>
</svg>
