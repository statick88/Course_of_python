<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="#1e293b"/>
  
  <!-- Title -->
  <text x="200" y="40" text-anchor="middle" fill="#f8fafc" font-family="system-ui" font-size="18" font-weight="bold">Manejo de Archivos</text>
  
  <!-- File icon -->
  <rect x="150" y="60" width="100" height="120" rx="8" fill="#3b82f6" stroke="#60a5fa" stroke-width="2"/>
  <text x="200" y="95" text-anchor="middle" fill="white" font-family="monospace" font-size="14" font-weight="bold">.txt</text>
  <text x="200" y="115" text-anchor="middle" fill="#dbeafe" font-family="monospace" font-size="10">.csv</text>
  <text x="200" y="135" text-anchor="middle" fill="#dbeafe" font-family="monospace" font-size="10">.json</text>
  <text x="200" y="155" text-anchor="middle" fill="#dbeafe" font-family="monospace" font-size="10">.py</text>
  
  <!-- Open arrow -->
  <path d="M150 120 L80 120" stroke="#10b981" stroke-width="2"/>
  <polygon points="75,120 85,115 85,125" fill="#10b981"/>
  <text x="100" y="110" text-anchor="middle" fill="#10b981" font-family="system-ui" font-size="10">open('r')</text>
  
  <!-- Write arrow -->
  <path d="M250 120 L320 120" stroke="#f59e0b" stroke-width="2"/>
  <polygon points="325,120 315,115 315,125" fill="#f59e0b"/>
  <text x="300" y="110" text-anchor="middle" fill="#f59e0b" font-family="system-ui" font-size="10">open('w')</text>
  
  <!-- Read box -->
  <rect x="20" y="130" width="60" height="35" rx="6" fill="#10b981"/>
  <text x="50" y="152" text-anchor="middle" fill="white" font-family="system-ui" font-size="11" font-weight="bold">Leer</text>
  
  <!-- Write box -->
  <rect x="320" y="130" width="60" height="35" rx="6" fill="#f59e0b"/>
  <text x="350" y="152" text-anchor="middle" fill="white" font-family="system-ui" font-size="11" font-weight="bold">Escribir</text>
  
  <!-- With statement -->
  <rect x="40" y="200" width="320" height="50" rx="10" fill="#334155"/>
  <text x="200" y="220" text-anchor="middle" fill="#f8fafc" font-family="monospace" font-size="13">with open("archivo.txt") as f:</text>
  <text x="200" y="240" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="11">Cierra automáticamente — ¡siempre usa with!</text>
  
  <!-- Bottom note -->
  <text x="200" y="285" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="10">read() · write() · readline() · json · csv · pathlib</text>
</svg>
