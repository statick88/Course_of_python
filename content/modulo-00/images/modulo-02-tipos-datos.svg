<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background -->
  <rect width="400" height="300" rx="16" fill="#1e293b"/>
  
  <!-- Title -->
  <text x="200" y="40" text-anchor="middle" fill="#f8fafc" font-family="system-ui" font-size="18" font-weight="bold">Tipos de Datos en Python</text>
  
  <!-- int box -->
  <rect x="30" y="70" width="160" height="50" rx="8" fill="#3b82f6"/>
  <text x="110" y="92" text-anchor="middle" fill="white" font-family="monospace" font-size="14" font-weight="bold">int</text>
  <text x="110" y="110" text-anchor="middle" fill="#dbeafe" font-family="system-ui" font-size="11">42, -7, 0, 1000</text>
  
  <!-- float box -->
  <rect x="210" y="70" width="160" height="50" rx="8" fill="#8b5cf6"/>
  <text x="290" y="92" text-anchor="middle" fill="white" font-family="monospace" font-size="14" font-weight="bold">float</text>
  <text x="290" y="110" text-anchor="middle" fill="#ede9fe" font-family="system-ui" font-size="11">3.14, -0.5, 2.0</text>
  
  <!-- str box -->
  <rect x="30" y="140" width="160" height="50" rx="8" fill="#10b981"/>
  <text x="110" y="162" text-anchor="middle" fill="white" font-family="monospace" font-size="14" font-weight="bold">str</text>
  <text x="110" y="180" text-anchor="middle" fill="#d1fae5" font-family="system-ui" font-size="11">"hola", 'Python'</text>
  
  <!-- bool box -->
  <rect x="210" y="140" width="160" height="50" rx="8" fill="#f59e0b"/>
  <text x="290" y="162" text-anchor="middle" fill="white" font-family="monospace" font-size="14" font-weight="bold">bool</text>
  <text x="290" y="180" text-anchor="middle" fill="#fef3c7" font-family="system-ui" font-size="11">True, False</text>
  
  <!-- Conversion arrows -->
  <path d="M110 190 L110 230 L290 230 L290 190" stroke="#64748b" stroke-width="2" stroke-dasharray="4 4" fill="none"/>
  <polygon points="290,195 285,205 295,205" fill="#64748b"/>
  <text x="200" y="245" text-anchor="middle" fill="#94a3b8" font-family="system-ui" font-size="11">int() → float() → str() → bool()</text>
  
  <!-- Bottom note -->
  <rect x="30" y="260" width="340" height="30" rx="6" fill="#334155"/>
  <text x="200" y="280" text-anchor="middle" fill="#cbd5e1" font-family="system-ui" font-size="10">type(valor) → revela el tipo de cualquier dato</text>
</svg>
