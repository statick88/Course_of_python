    - "images/*.jpg"
    - "images/*.svg"
    - "recursos"

book:
  title: "Programación Python Fundamentos"
  subtitle: "De cero a programador — Aprende Python con desafíos prácticos"
  author: "Diego Saavedra"
  output-file: "programacion_python_fundamentos"
  date: today
  date-format: medium
  favicon: images/python-logo.png
  description: "Curso completo de programación Python para principiantes — 70+ desafíos prácticos, laboratorios interactivos y proyectos reales"
  keyword: "Python, Programación, Fundamentos, Desarrollo de Software, Abacom, Curso"
  url: https://github.com/statick88/course_of_python

  # Professional navigation features
  reader-mode: true
  back-to-top-navigation: true
  page-navigation: true
  search: true

  # Sidebar config
  sidebar:
    logo: images/python-logo.png
    search: true
    collapse-level: 1
    pinned: true

  # Repository info
  repo-url: https://github.com/statick88/course_of_python
  repo-branch: main
  repo-actions:
    - edit
    - issue

  # Sharing and downloads
  sharing:
    - twitter
    - linkedin
  downloads:
    - pdf
    - epub

  # Cover image
  image: images/portada-python.svg
  image-alt: "Programación Python Fundamentos - Curso Completo"

  # Open Graph / Social Media
  open-graph:
    image: images/portada-python.svg
    image-alt: "Programación Python Fundamentos"
    title: "Programación Python Fundamentos"
    description: "Curso completo de Python para principiantes con 70+ desafíos prácticos"

  twitter-card:
    image: images/portada-python.svg
    image-alt: "Programación Python Fundamentos"
    title: "Programación Python Fundamentos"
    description: "Curso completo de Python para principiantes"
    card-style: summary_large_image

  # Cover image for PDF/EPUB
  cover-image: images/portada-python.svg

  # Professional footer
  page-footer:
    border: true
    left: |
      © 2026 **Diego Saavedra**. Licensed under [CC BY-NC-SA 4.0](https://creativecommons.org/licenses/by-nc-sa/4.0/)
    center: |
      Material educativo para **Abacom Capacitación y Servicios**
    right: |
      Built with [Quarto](https://quarto.org/)

