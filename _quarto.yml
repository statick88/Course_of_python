bibliography: references.bib
biblio-style: apalike

filters:
  - include-code-files
  - collapse-callout
  - linkrot
  - quizdown
  - line-highlight
  - details
  - code-fullscreen
  - fancy-text
  - fontawesome
  - highlight-text
  - language-cell-decorator
  - code-appendix
  - badge
  - qrcode
  - custom-callout
  - bsicons
  - social-embeds
  - wordcount

# Plugin-specific options
quizdown:
  use-bootstrap-css: true

wordcount:
  output: "auto"

linkrot:
  warn: true

extensions:
  linkrot:
    skip-patterns:
      - "^http://localhost(:[0-9]+)?(/.*)?$"

code-fullscreen:
  button: true

format:
  html:
    number-sections: false
    theme:
      dark: solar
      light: cosmo
    number-depth: 4
    link-external-icon: true
    link-external-newwindow: true
    css:
      - theme.scss
      - css/styles.css
    include-in-header:
      - text: |
          <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

  pdf:
    documentclass: scrreprt
    classoption:
      - "onepage"
      - "openany"
    papersize: a4
    toc: true
    margin-top: 35mm
    margin-left: 30mm
    margin-bottom: 30mm
    margin-right: 30mm
    titlepage-geometry:
      - top=35mm
      - bottom=30mm
      - right=30mm
      - left=30mm

  epub:
    belongs-to-collection: "Programación Python Fundamentos"
    group-position: 0
    creator: "Diego Saavedra"
    rights: "© Diego Saavedra | 2026"
    fig-responsive: true
    number-sections: true
