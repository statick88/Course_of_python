format:
  epub:
    belongs-to-collection: Programación Python Fundamentos
    creator: Diego Saavedra
    fig-responsive: true
    group-position: 0
    number-sections: true
    rights: © Diego Saavedra | 2026
  html:
    css:
    - theme.scss
    - css/styles.css
    include-in-header:
    - text: '<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

        '
    link-external-icon: true
    link-external-newwindow: true
    number-depth: 4
    number-sections: false
    theme:
      dark: solar
      light: cosmo
  pdf:
    classoption:
    - onepage
    - openany
    documentclass: scrreprt
    margin-bottom: 30mm
    margin-left: 30mm
    margin-right: 30mm
    margin-top: 35mm
    papersize: a4
    titlepage-geometry:
    - top=35mm
    - bottom=30mm
    - right=30mm
    - left=30mm
    toc: true
linkrot:
  warn: true
project:
  output-dir: docs
  resources:
  - images/*.png
  - images/*.jpg
  - images/*.svg
  - recursos
  type: book
quizdown:
  use-bootstrap-css: true
wordcount:
  output: auto
