name: Deploy Curso con Quarto

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Quarto 1.7.29
        run: |
          cd /tmp
          curl -fsSL https://github.com/quarto-dev/quarto-cli/releases/download/v1.7.29/quarto-1.7.29-linux-amd64.tar.gz -o quarto.tar.gz
          tar -xzf quarto.tar.gz
          sudo mkdir -p /opt/quarto
          sudo cp -r quarto-1.7.29/* /opt/quarto/
          rm -rf quarto*

      - name: Set Quarto PATH
        run: echo "PATH=/opt/quarto/bin:$PATH" >> $GITHUB_ENV

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install jupyter jupyter_client
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Verify Quarto project
        run: |
          echo "=== Files in root ==="
          ls -la
          echo "=== _quarto.yml exists? ==="
          test -f _quarto.yml && echo "YES" || echo "NO"
          echo "=== Quarto version ==="
          quarto --version

      - name: Render Quarto Book (static, no execution)
        run: quarto render --to html --no-execute

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Failure handling: Create issue when deployment fails
      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { workflow, run } = context.payload;
            const { repository } = context.repo;
            
            const issueTitle = `🚨 Deployment failed: ${workflow.name} - Run #${run.run_number}`;
            const issueBody = `
            ### Deployment Failure Report
            
            **Workflow**: ${workflow.name}
            **Run**: #${run.run_number} (\`${run.run_id}\`)
            **Branch**: ${context.payload.ref || 'unknown'}
            **Commit**: ${context.payload.after || 'unknown'}
            **Triggered by**: ${context.payload.sender?.login || 'unknown'}
            **Time**: ${new Date().toISOString()}
            
            ### Details
            The GitHub Actions workflow for deploying the Python course has failed.
            
            [View workflow run](${run.html_url})
            [View repository](${{ repository.html_url }})
            
            ### Next Steps
            1. Check the workflow logs for detailed error information
            2. Common issues:
               - Quarto installation problems
               - Python dependency conflicts
               - Rendering errors in QMD files
               - GitHub Pages configuration issues
            
            Please investigate and resolve the issue to restore course availability.
            `;
            
            github.rest.issues.create({
              owner: repository.owner,
              repo: repository.repo,
              title: issueTitle,
              body: issueBody,
              labels: ['deployment', 'failure', 'automated']
            });
