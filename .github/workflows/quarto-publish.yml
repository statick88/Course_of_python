name: Deploy Curso con Quarto

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.7.29
          download-native: true

      - name: Force Quarto version
        run: |
          quarto --version
          if ! quarto --version | grep -q "1.7"; then
            echo "Quarto version mismatch, installing manually..."
            curl -fsSL https://github.com/quarto-dev/quarto/releases/download/v1.7.29/quarto-1.7.29-linux-amd64.tar.gz -o /tmp/quarto.tar.gz
            tar -xzf /tmp/quarto.tar.gz -C /tmp
            sudo cp -r /tmp/quarto-1.7.29-linux-amd64/* /opt/quarto/
            rm -rf /tmp/quarto*
            quarto --version
          fi

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Verify Quarto project
        run: |
          echo "=== Files in root ==="
          ls -la
          echo "=== _quarto.yml exists? ==="
          test -f _quarto.yml && echo "YES" || echo "NO"
          echo "=== Quarto version ==="
          quarto --version

      - name: Render Quarto Book
        run: quarto render --to html

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
