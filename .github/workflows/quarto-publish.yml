name: Deploy Curso con Quarto

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Quarto CLI
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.7.29

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install jupyter jupyter_client
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Set environment variables for Quarto
        run: |
          # Set dummy non-empty environment variables to avoid Quarto error
          echo "OPENWEATHER_API_KEY=demo_key_not_used" >> $GITHUB_ENV
          echo "DEMO_PASSWORD=demo_password_not_used" >> $GITHUB_ENV
        shell: bash

      - name: Verify Quarto project
        run: |
          echo "=== Files in root ==="
          ls -la
          echo "=== _quarto.yml exists? ==="
          test -f _quarto.yml && echo "YES" || echo "NO"
          echo "=== Quarto version ==="
          quarto --version

      - name: Render Quarto Book (static, no execution)
        run: quarto render --to html --no-execute

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4